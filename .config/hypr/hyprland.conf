source = $XDG_CONFIG_HOME/hypr/hyprtheme.conf

# Quick access changes
$workspace_orientation = vertical
$animation_fast_speed = 3
$animation_slow_speed = 8
$rounding = 5
$gaps_in = 7
$gaps_out = 10
$layout = scrolling
$hypr_cursor_theme = Oxygen_Zion #rose-pine-hyprcursor #Oxygen_Zion #Breeze_Snow
$x_cursor_theme = Oxygen_Zion #Breeze #BreezeX-RoséPine #Oxygen_Zion #Breeze_Snow
$file_manager = dolphin


# Startup
exec-once = waybar -c $XDG_CONFIG_HOME/waybar/config -s $XDG_CONFIG_HOME/waybar/style.css #horizontal main bar
exec-once = waybar -c $XDG_CONFIG_HOME/waybar/config-vert -s $XDG_CONFIG_HOME/waybar/style-vert.css #vertical bar
exec-once = sleep 0.5 && awww-daemon #currently some issue with awww init loading cache
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = sleep 2.0 & /usr/bin/pcloud #pcloud looks for internet before its connected, removes "no internet" notifs
exec-once = /usr/bin/dunst
exec-once = fusuma -d -c $XDG_CONFIG_HOME/fusuma/config-hyprland.yml
exec-once = blueman-applet
exec-once = bluetoothctl connect C0:BC:68:26:93:A9 #Logi K250 keyboard
exec-once = pactl load-module module-switch-on-connect #for bluetooth headphones
exec-once = hyprctl setcursor $x_cursor_theme 24
exec-once = gsettings set org.gnome.desktop.interface cursor-theme $cursor_theme
exec-once = wayscriber --daemon --no-tray
exec-once = copyq --start-server 
exec-once = hypridle
exec-once = hyprsunset
# exec-once = swayidle -C $XDG_CONFIG_HOME/swayidle/config
# exec-once = hyprpm reload -n && hyprctl reload #plugins take a while to load on startup
# exec-once = emacs --daemon


# env - theming and toolkits
env = HYPRCURSOR_THEME,$hypr_cursor_theme
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,$x_cursor_theme
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = SAL_USE_VCLPLUGIN=qt6 #for libreoffice. The themes are super finicky, this might need to change
env = GDK_SCALE,1.0
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = DOOMDIR,$XDG_CONFIG_HOME/doom #doom emacs config
# XDG specs
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
# aquamarine gpu stuff
env = AQ_DRM_DEVICES,/dev/dri/card2:/dev/dri/card1 #iGPU priority, else dGPU


# Monitors configuration
monitor = eDP-1, 1920x1200, 0x0, 1.333333           #dGPU laptop internal
monitor = eDP-2, 1920x1200@90, 0x0, 1.333333           #iGPU laptop internal
monitor = desc:Samsung Electric Company C24F390 HFAR300143, 1920x1080@60, auto-right, 1 #home desk monitor
monitor = desc:LG Electronics LG FULL HD 403SHFK02755, 1920x1080@60, auto-right, 1 #stellenbosch desk monitor
monitor = desc:IWB PC Monitor, preferred, auto-right, 2 #stellenbosch group projector
monitor = DP-2, preferred, auto-right, 1.0           #usb-c adapter general
monitor = ,preferred,auto,auto
monitor = , addreserved, 42, 0, 0, 0

debug {
    vfr = true # set to true for power saving
    error_position = 1
	disable_logs = false #make this false for logs
	enable_stdout_logs = false #logs in tty
}

xwayland {
	force_zero_scaling = true
}

input {
    touchpad {
        natural_scroll = yes
    }

    kb_layout = us
    numlock_by_default = true
    kb_options = caps:swapescape #swap esc and caps lock
    follow_mouse = 1 #focus window under cursor at all times
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

misc {
    initial_workspace_tracking = 0
	disable_autoreload = true
    focus_on_activate = true #needed for rofi window switching
    font_family = Ubuntu # set when we get catch up to new version
    disable_hyprland_logo = true
    disable_splash_rendering = true

}

general {
    layout = $layout
    gaps_in = $gaps_in
    gaps_out = $gaps_out
    gaps_workspaces = 75
    border_size = 2
    resize_on_border = true
	extend_border_grab_area = 15
	hover_icon_on_border = true

    #colors (for gradient: col1 col2 angle)
    col.active_border = $accent1 $accent2 90deg
    col.inactive_border = $gray
		snap {
			enabled = true
			monitor_gap = 20
			window_gap = 20
	}

}

group {
	col.border_active = $accent2
    col.border_locked_active = $maroon
    groupbar {
        enabled = true
        height = 15
        font_size = 15
        gradients = true
        col.active = $accent2
        col.inactive = $gray
        text_color = $background
    }

}

decoration {
    rounding = $rounding
	blur {
    	enabled = yes
    	size = 5
    	passes = 1
    	new_optimizations = on
    	xray = true
	}
	shadow {
    	enabled = yes
    	render_power = 2
    	range = 15
    	offset = 5 5
    	scale = 0.99
    	color = $background
	}
    dim_around = 0.5
    dim_special = 0.5
    inactive_opacity = 0.95
}

animations {
    # animation=NAME,ONOFF,SPEED,CURVE[,STYLE]
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, $animation_fast_speed, myBezier
    animation = windowsOut, 1, $animation_fast_speed, default
    animation = windowsIn, 1, $animation_fast_speed, default, popin 70%
    animation = border, 1, $animation_fast_speed, default
    animation = borderangle, 1, $animation_fast_speed, default
    animation = fade, 1, $animation_fast_speed, default
    animation = workspaces, 1, $animation_fast_speed, default, slidefadevert 10%
    animation = specialWorkspace, 1, $animation_fast_speed, default, slidefadevert -50% #slide from top
    animation = layersIn, 1, $animation_fast_speed, default, slide top
    animation = layersOut, 1, $animation_slow_speed, default, slide top
}

dwindle {
    # pseudotile = yes # 0.55 break
    preserve_split = yes
    smart_split = no
}

master {
    mfact = 0.6
}

scrolling {
	direction = right
	column_width = 0.9
	focus_fit_method = 0 # 0 - center, 1 - fit 
}

gestures {
	workspace_swipe_forever = true
    workspace_swipe_create_new = true
    workspace_swipe_use_r = false
}

# Note! On ASUS TUF A17, 5 finger swipes aren't recognised (check libinput debug-events)
gesture = 3, $workspace_orientation, workspace
gesture = 3, pinch, fullscreen #change to maximize when bug is fixed
gesture = 4, up, dispatcher, sendshortcut, CTRL, T, activewindow
gesture = 4, down, dispatcher, sendshortcut, CTRL, W, activewindow
gesture = 4, left, dispatcher, sendshortcut, CTRL, TAB, activewindow
gesture = 4, right, dispatcher, sendshortcut, CTRL SHIFT, TAB, activewindow
# gesture = 4, pinch, cursorZoom, 1.5 #this doesn't currently feel very nice to use, reconsider


binds {
    allow_workspace_cycles = true
    workspace_back_and_forth = true
}

# Workspace Rules
workspace = 1, persistent:false, default:true
workspace = 2, persistent:false,
workspace = 3, persistent:false,
workspace = 4, persistent:false,
workspace = 5, persistent:false,
workspace = 6, persistent:false,
workspace = 7, persistent:false,
workspace = 8, persistent:false,
workspace = 9, persistent:false,
workspace = 10, persistent:false,
workspace = 11, persistent:false,

#workspace aesthetics
workspace = special:sysmonitor, on-created-empty:alacritty -e btop, gapsout:60
workspace = special:calculator, on-created-empty:kcalc, gapsout:120
workspace = special:hidden, gapsout:120
workspace = w[vt1], bordersize:0, rounding:0 #no borders on workspaces with only one visible (v) tiled (t) window
workspace = f[1], gapsout:0, gapsin:0, bordersize:0, rounding:0 #no gaps for workspaces with maximised windows


# Specific window/layer Rules
windowrule = match:workspace 8, float on
windowrule = match:float 1, border_color $mauve
windowrule = match:class firefox, workspace 3
windowrule = match:class code, workspace 4
windowrule = match:class Zotero, workspace 5
windowrule = match:class obsidian, workspace 6
windowrule = match:class ferdium, workspace 7
windowrule = match:class steam, workspace 8
windowrule = match:class heroic, workspace 8
windowrule = match:class Spotify, workspace 9
windowrule = match:class org.kde.elisa, workspace 9
windowrule = match:class WebApp-Lumo3764, workspace 10

windowrule = match:title ^(Progress), float on #zotero citekeys progress window
windowrule = match:title ^(Progress), no_initial_focus on
windowrule = match:title (.*)(Zotero Settings), float on
windowrule = match:class ^(Zotero), rounding 13
windowrule = match:title (.*)(CopyQ), float on
windowrule = match:title (.*)(CopyQ), size <70% <70%

# windowrule = pin, title:^(as_toolbar)(.*)$
windowrule = stay_focused on, match:title ^(menu window)$, match:class ^(Zoom Workplace)$ # this is for zoom popups that lose focus after moving mouse cursor
windowrule = match:title (.*)(Oracle VirtualBox)(.*), opaque on
windowrule = match:title (.*)(Oracle VirtualBox)(.*), no_shadow on
windowrule = match:title (.*)(Oracle VirtualBox)(.*), rounding 0

windowrule = match:class (.*)(SourceGit)(.*), opaque on
windowrule = match:class (.*)(SourceGit)(.*), no_shadow on
windowrule = match:class (.*)(SourceGit)(.*), no_blur on

layerrule = match:namespace rofi, dim_around on
layerrule = match:namespace waybar, blur on
# layerrule = match:namespace waybar, ignore_alpha on # 0.55 break
layerrule = match:namespace selection, no_anim on # for grim+slurp screenshots
layerrule = match:namespace grim, no_anim on ignore_zero on # for grim+slurp screenshots

#file picker dialogs
windowrule = match:title ^(Save)(.*)$, float on
windowrule = match:title (Save)(.*)$, size 50% 70%
# windowrule = match:title ^(Save)(.*)$, pin on, move 50% 30%

windowrule = match:title ^(Open)(.*)$, float on
windowrule = match:title (Open)(.*)$, size 50% 70%
# windowrule = pin, move 50% 30%, title:^(Open)(.*)$

# Keybindings
$mainMod = SUPER

#general
bind = $mainMod CTRL, R, exec, hyprctl reload
bind = $mainMod, Q, killactive,
bind = $mainMod, T, togglefloating,
bind = $mainMod CTRL, T, workspaceopt, allfloat
bind = $mainMod CTRL, P, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, S, togglespecialworkspace, sysmonitor
bind = $mainMod, C, togglespecialworkspace, calculator
# bind = $mainMod, H, exec, hyprpm reload && hyprctl reload

#launchers
bind = $mainMod, Return, exec, alacritty
bind = $mainMod, B, exec, firefox
bind = $mainMod, D, exec, $file_manager
bind = $mainMod, E, exec, emacsclient -c -a ''
bind = $mainMod, I, exec, copyq toggle
bind = $mainMod, W, exec, pkill -SIGUSR1 wayscriber

#rofi stuff
bind = $mainMod, R, exec, sh $XDG_CONFIG_HOME/rofi/run/run.sh
bind = $mainMod, A, exec, sh $XDG_CONFIG_HOME/rofi/apps/apps.sh
bind = $mainMod, P, exec, sh $XDG_CONFIG_HOME/rofi/powermenu/powermenu.sh
bind = $mainMod, O, exec, sh $XDG_CONFIG_HOME/rofi/filebrowser/filebrowser.sh
bind = ALT, TAB, exec, sh $XDG_CONFIG_HOME/rofi/window/window.sh

#hide/show waybar. To reload waybar config, use -SIGUSR2 signal
bind = $mainMod, Z, exec, killall -SIGUSR1 waybar
bind = $mainMod SHIFT, Z, exec, killall -SIGUSR2 waybar

#windows
bind = $mainMod, F, exec, hyprctl dispatch fullscreen 0 #entire screen
bind = $mainMod, M, exec, hyprctl dispatch fullscreen 1 #keep gaps + bars (maximise)
bind = $mainMod CTRL, G, exec, sh $XDG_CONFIG_HOME/hypr/gapstoggle.sh #no gaps

#special workspace:hidden for sending windows to the shadow realm
bind = $mainMod, X, movetoworkspacesilent, special:hidden
bind = $mainMod SHIFT, X, togglespecialworkspace, hidden

#move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
binde = $mainMod CTRL, H, resizeactive, -20 0
binde = $mainMod CTRL, L, resizeactive, 20 0
binde = $mainMod CTRL, J, resizeactive, 0 20
binde = $mainMod CTRL, K, resizeactive, 0 -20

#groups
bind = $mainMod, G, togglegroup
bind = $mainMod SHIFT, G, changegroupactive, b
# bind = $mainMod SHIFT, W, swapsplit #0.55 break
# bind = $mainMod CTRL, W, togglesplit #0.55 break

#focus
bind = $mainMod, space, cyclenext
bind = $mainMod, space, alterzorder, top
bind = $mainMod, comma, focusmonitor, -1
bind = $mainMod, period, focusmonitor, +1
# bind = $mainMod, TAB, workspace, previous_per_monitor
bind = $mainMod, TAB, workspace, previous # change to above line when bug gets fixed

#scrolling layout navigation
bind = $mainMod, LEFT, layoutmsg, focus left
bind = $mainMod, RIGHT, layoutmsg, focus right
bind = $mainMod SHIFT, LEFT, movewindow, left #can change this to consume_or_expel at some point
bind = $mainMod SHIFT, RIGHT, movewindow, right
bind = $mainMod SHIFT, mouse_up, layoutmsg, focus right 
bind = $mainMod SHIFT, mouse_down, layoutmsg, focus left 
bind = $mainMod, L, layoutmsg, focus right
bind = $mainMod, H, layoutmsg, focus left
bind = $mainMod, J, layoutmsg, focus down
bind = $mainMod, K, layoutmsg, focus up
bind = $mainMod SHIFT, H, movewindow, left #can change this to consume_or_expel at some point
bind = $mainMod SHIFT, L, movewindow, right
bind = $mainMod SHIFT, J, movewindow, down
bind = $mainMod SHIFT, K, movewindow, up

#switch workspaces
binde = $mainMod, UP, workspace, r-1 # for vertical workspaces
binde = $mainMod, DOWN, workspace, r+1
bind = $mainMod, mouse_up, workspace, r+1
bind = $mainMod, mouse_down, workspace, r-1
# binde = $mainMod, LEFT, workspace, r-1 # for horizontal workspaces - make this conditional with lua config
# binde = $mainMod, RIGHT, workspace, r+1 
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, UP, movetoworkspace, r-1
bind = $mainMod SHIFT, DOWN, movetoworkspace, r+1
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

#active workspace navigation
bind = $mainMod CTRL, UP, workspace, e-1
bind = $mainMod CTRL, DOWN, workspace, e+1

#monitors
bind = CTRL ALT, LEFT, movecurrentworkspacetomonitor, +1
bind = CTRL ALT, RIGHT, movecurrentworkspacetomonitor, -1
bind = $mainMod CTRL, M, exec, hyprctl keyword monitor "eDP-2,disable"
bind = $mainMod CTRL SHIFT, M, exec, hyprctl keyword monitor "eDP-2,enable"

#utilities
binde = ,XF86MonBrightnessUp,exec,brightnessctl -e1 set +10%
binde = ,XF86MonBrightnessDown,exec,brightnessctl -e1 set 10%-
binde = ,XF86AudioRaiseVolume,exec,pamixer -i 5
binde = ,XF86AudioLowerVolume,exec,pamixer -d 5
bind = ,XF86AudioPlay,exec,playerctl play-pause
bind = ,XF86AudioNext,exec,playerctl next
bind = ,XF86AudioPrevious,exec,playerctl previous
bind = ,Print,exec,sh ~/.local/scripts/wayland-screenshot.sh

#gamemode - toggle fancy effects
bind = $mainMod, F1, exec, $XDG_CONFIG_HOME/hypr/gamemode.sh

#power management and locking
bind = $mainMod, F12, exec, hyprlock 
bindl = ,switch:Lid Switch,exec, hyprlock
bindl = $mainMod SHIFT, F12, exec, sleep 1 && hyprctl dispatch dpms toggle #dpsm toggle currently not behaving right

#exit hyprland
bind = $mainMod SHIFT, Q, exec, ~/.local/scripts/logout.sh
bind = $mainMod SHIFT, Q, exit,

#submap for virtual machine keyboard passthrough
bind = $mainMod, V, submap, passthrough
submap = passthrough
bind = $mainMod, V, submap, reset
submap = reset

# when lua comes - make overview viewable with meta + three finger swipe
